<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Grgy Sukhanov</title>
<link rel="icon" href="favicon.ico" sizes="32x32" type="image/png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
<a href="index.html"><img src="images/logo.png" alt="Логотип сайта" class="logo"></a>
<nav class="site-nav" aria-label="Main navigation">
<a href="https://grgyone.com">Home</a>
<a href="about.html">About</a>
<div class="nav-dropdown">
<a href="portfolio.html" class="nav-dropdown-toggle" aria-expanded="false" aria-controls="portfolio-submenu">Portfolio</a>
<div id="portfolio-submenu" class="nav-dropdown-menu" hidden>
<a href="/free/">FREE</a>
</div>
</div>
<a href="store.html">STORE</a>
<a href="cart_items.html" class="cart-link">Cart <span id="cart-badge" class="cart-badge"></span></a>
</nav>
</header>
<main class="cart-main">
  <section class="store-hero">
  </section>
  <p id="cart-empty" class="cart-empty">Your cart is empty.</p>
  <section id="cart-list" class="cart-list" aria-label="Cart items"></section>
  <section class="cart-summary">
    <p>Total</p>
    <strong id="cart-grand-total">0 RUB</strong>
  </section>
  <section class="checkout-section">
    <h2>Order request</h2>
    <form id="checkout-form" class="checkout-form">
      <label for="customer-email">Email *</label>
      <input id="customer-email" name="email" type="email" required>

      <label for="customer-contact">How can we contact you?</label>
      <input id="customer-contact" name="contact" type="text" placeholder="почта, ссылка на соцсеть">

      <label for="customer-comment">Comment</label>
      <textarea id="customer-comment" name="comment" rows="4"></textarea>

      <button id="checkout-button" type="submit">Сделать заказ</button>
    </form>
    <p id="checkout-result" class="checkout-result" aria-live="polite"></p>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="cart-utils.js"></script>
<script src="site-nav.js"></script>
<script src="cart-page.js"></script>
</body>
</html>
